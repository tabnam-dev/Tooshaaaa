<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>For Toosha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#3fce73 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ff8cc8 0%,transparent 35%),
    linear-gradient(135deg,#0d1b14,#10281b,#14261d);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    position:relative;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.open-section{
    height:260px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    cursor:pointer;
    transition:0.4s ease;
}

.open-section:active{
    transform:scale(0.98);
}

.tap-circle{
    width:150px;
    height:150px;
    border-radius:50%;
    background:linear-gradient(135deg,#4de58d,#ff9ed2);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 0 60px rgba(77,229,141,0.25);
    animation:pulse 2.5s infinite;
}

.tap-circle span{
    color:white;
    font-size:28px;
    font-weight:600;
    letter-spacing:0.5px;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

.poem{
    max-height:0;
    overflow:hidden;
    transition:max-height 1s ease,padding 0.8s ease;
    padding:0 28px;
}

.poem.show{
    max-height:2000px;
    padding:10px 28px 35px;
}

.poem-text{
    color:white;
    font-size:18px;
    line-height:1.95;
    text-align:center;
    font-weight:300;
}

.glow{
    position:absolute;
    width:220px;
    height:220px;
    background:#ff9ed2;
    filter:blur(120px);
    opacity:0.18;
    top:-80px;
    right:-70px;
}

.glow2{
    position:absolute;
    width:220px;
    height:220px;
    background:#4de58d;
    filter:blur(120px);
    opacity:0.18;
    bottom:-80px;
    left:-70px;
}

@media (max-width:480px){

    .open-section{
        height:240px;
    }

    .tap-circle{
        width:135px;
        height:135px;
    }

    .tap-circle span{
        font-size:25px;
    }

    .poem-text{
        font-size:17px;
        line-height:1.9;
    }

}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="container">
    <div class="card">

        <div class="open-section" onclick="openPoem()">
            <div class="tap-circle">
                <span>heyy toosha</span>
            </div>
        </div>

        <div class="poem" id="poem">
            <div class="poem-text">

                your poem goes here

            </div>
        </div>

    </div>
</div>

<script>
function openPoem(){
    document.getElementById("poem").classList.toggle("show");
}
</script>

</body>
</html>
